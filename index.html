    async function fetchJSON(url) {
      const res = await fetch(url, { headers: { Accept: &quot;application/json&quot; } });
      if (!res.ok) {
        let extra = &quot;&quot;;
        try {
          const j = await res.json();
          extra = j?.error?.message ? ` — ${j.error.message}` : j?.error ? ` — ${JSON.stringify(j.error)}` : &quot;&quot;;
          setDebug(j);
        } catch (_) {}
        throw new Error(`HTTP ${res.status}${extra}`);
      }
      return res.json();
    }

    function pickFirstString(obj, keys) {
      for (const k of keys) {
        const v = obj?.[k];
        if (typeof v === &quot;string&quot; &amp;&amp; v.trim()) return v.trim();
      }
      return null;
    }

    function buildEventSection(ev) {
      const category =
        pickFirstString(ev, [&quot;category_title&quot;, &quot;category&quot;, &quot;category_name&quot;]) ||
        pickFirstString(ev?.category, [&quot;title&quot;, &quot;name&quot;]) ||
        (Array.isArray(ev?.categories) ? pickFirstString(ev.categories[0], [&quot;title&quot;, &quot;name&quot;]) : null);

      const topic =
        pickFirstString(ev, [&quot;series_title&quot;, &quot;series&quot;, &quot;topic&quot;, &quot;subcategory_title&quot;, &quot;subtitle&quot;]) ||
        pickFirstString(ev?.series, [&quot;title&quot;, &quot;name&quot;]) ||
        (Array.isArray(ev?.tags)
          ? (typeof ev.tags[0] === &quot;string&quot; ? ev.tags[0] : pickFirstString(ev.tags[0], [&quot;title&quot;, &quot;name&quot;]))
          : null);

      if (category &amp;&amp; topic) return `${category} · ${topic}`;
      if (category) return category;
      if (topic) return topic;
      return null;
    }

    async function fetchEventSection(eventTicker) {

        setDebug(payload);

    function extractCandidateNameFromTitle(title, fallbackTicker) {
      const t = (title || &quot;&quot;).trim();
      const patterns = [
        /Will\s+(.+?)\s+win\b/i,
        /Will\s+(.+?)\s+be\b/i,
        /nominate\s+(.+?)\s+as\s+/i
      ];
      for (const pattern of patterns) {
        const m = t.match(pattern);
        if (m &amp;&amp; m[1]) return m[1].trim().replace(/\?$/, &quot;&quot;);
      }
      const parts = (fallbackTicker || &quot;&quot;).split(&quot;-&quot;);
      return parts[parts.length - 1] || fallbackTicker || &quot;—&quot;;
    }

    function sumNumbers(arr, getter) {
      let s = 0;
      for (const item of arr || []) {
        const v = n(getter(item));
        if (v !== null) s += v;
      }
      return s;
    }

    function computeEventTotals(markets) {
      return {
        totalOI: sumNumbers(markets, (m) =&gt; getOpenInterest(m)),
        totalVolContracts: sumNumbers(markets, (m) =&gt; getVolume(m)),
        totalVol24hContracts: sumNumbers(markets, (m) =&gt; getVolume24h(m))

    }

    async function getMarketSummary(ticker) {
      const t = (ticker || &quot;&quot;).toUpperCase();
      if (!t) return null;
      if (marketSummaryCache.has(t)) return marketSummaryCache.get(t);

      const fromList = lastEventMarkets.find((m) =&gt; (m?.ticker || &quot;&quot;).toUpperCase() === t) || null;
      if (fromList) {
        const out = {
          volume: getVolume(fromList),
          volume_24h: getVolume24h(fromList),
          open_interest: getOpenInterest(fromList)
        };
        if (out.volume !== null &amp;&amp; out.volume_24h !== null &amp;&amp; out.open_interest !== null) {
          marketSummaryCache.set(t, out);
          return out;
        }
      }

      try {
        const payload = await fetchJSON(`${BASE}/markets/${encodeURIComponent(t)}`);
        const mk = payload.market ?? payload;
        const out = {
          volume: getVolume(mk),
          volume_24h: getVolume24h(mk),
          open_interest: getOpenInterest(mk)
        };
        marketSummaryCache.set(t, out);
        return out;
      } catch (_) {
        return null;
      }
    }

        if (fromList) {

        } else {

          if (summary) {

            applyEventTopTilesDefault();
          }

        applyEventTopTilesDefault();

    function sortMarkets(markets, mode) {
      const m = [...markets];

      const vol = (o) =&gt; getVolume(o) ?? -Infinity;
      const title = (o) =&gt; (o?.title || &quot;&quot;).toLowerCase();
      switch (mode) {
        case &quot;yes_asc&quot;: m.sort((a, b) =&gt; yesBid(a) - yesBid(b)); break;
        case &quot;vol_desc&quot;: m.sort((a, b) =&gt; vol(b) - vol(a)); break;
        case &quot;title_asc&quot;: m.sort((a, b) =&gt; title(a).localeCompare(title(b))); break;
        case &quot;yes_desc&quot;:
        default: m.sort((a, b) =&gt; yesBid(b) - yesBid(a)); break;
      }
      return m;
    }

    async function getMarketOpenTs(ticker) {
      const t = (ticker || &quot;&quot;).toUpperCase();

      try {

          null;
        marketOpenTsCache.set(t, ts);
        return ts;

        marketOpenTsCache.set(t, null);
        return null;
      }
    }

      const vals = await Promise.all((tickers || []).map(getMarketOpenTs));
      const nums = vals.filter((v) =&gt; typeof v === &quot;number&quot; &amp;&amp; v &gt; 0);
      return nums.length ? Math.min(...nums) : null;

    async function rangeToWindow(range, tickersForChart) {
      const nowSec = Math.floor(Date.now() / 1000);
      if (range === &quot;live&quot;) return { start: nowSec - 3600, end: nowSec, interval: 1 };
      if (range === &quot;1d&quot;) return { start: nowSec - 86400, end: nowSec, interval: 60 };
      if (range === &quot;1w&quot;) return { start: nowSec - 7 * 86400, end: nowSec, interval: 60 };
      if (range === &quot;1m&quot;) return { start: nowSec - 30 * 86400, end: nowSec, interval: 1440 };
      if (range === &quot;1y&quot;) return { start: nowSec - 365 * 86400, end: nowSec, interval: 1440 };
      const inception = await getEarliestOpenTs(tickersForChart);
      return { start: inception ?? (nowSec - 5 * 365 * 86400), end: nowSec, interval: 1440 };
    }

    const endPointLabelsPlugin = {
      id: &quot;endPointLabelsPlugin&quot;,
      afterDatasetsDraw(chartInstance) {
        const { ctx, chartArea } = chartInstance;
        if (!chartArea) return;
        ctx.save();
        ctx.font = &quot;800 15px system-ui, -apple-system, Segoe UI, Roboto, sans-serif&quot;;
        ctx.textBaseline = &quot;middle&quot;;
        chartInstance.data.datasets.forEach((dataset, datasetIndex) =&gt; {
          const meta = chartInstance.getDatasetMeta(datasetIndex);
          if (!meta || meta.hidden || !meta.data || !meta.data.length) return;
          let lastIndex = meta.data.length - 1;
          while (lastIndex &gt;= 0 &amp;&amp; !meta.data[lastIndex]) lastIndex--;
          if (lastIndex &lt; 0) return;
          const point = meta.data[lastIndex];
          const value = dataset.data?.[lastIndex]?.y;
          if (!Number.isFinite(value)) return;
          const color = dataset.borderColor || &quot;#fff&quot;;
          const x = Math.min(point.x + 14, chartArea.right + 8);
          const y = Math.max(chartArea.top + 12, Math.min(point.y, chartArea.bottom - 12));
          ctx.fillStyle = color;
          ctx.strokeStyle = &quot;rgba(17,19,23,.92)&quot;;
          ctx.lineWidth = 5;
          ctx.strokeText(`${Math.round(value)}%`, x, y);
          ctx.fillText(`${Math.round(value)}%`, x, y);
        });
        ctx.restore();
      }
    };

      const url = `${BASE}/markets/candlesticks?market_tickers=${encodeURIComponent(tickers.join(&quot;,&quot;))}&amp;start_ts=${start}&amp;end_ts=${end}&amp;period_interval=${interval}&amp;include_latest_before_start=true`;
      const payload = await fetchJSON(url);
      setDebug(payload);

      const markets = payload?.markets || [];
      if (!Array.isArray(markets) || !markets.length) {
        throw new Error(&quot;No candlestick data returned for chart range.&quot;);
      }

      const byTicker = new Map();
      for (const m of markets) byTicker.set((m?.market_ticker || &quot;&quot;).toUpperCase(), m);
      const orderedMarkets = tickers.map((t) =&gt; byTicker.get((t || &quot;&quot;).toUpperCase())).filter(Boolean);

        const marketTicker = (m?.market_ticker || &quot;&quot;).toUpperCase();
        const label = tickerToName.get(marketTicker) || marketTicker;
        const data = toChartPoints(m?.candlesticks || []);
        const color = palette[idx % palette.length];

          label,
          data,
          borderColor: color,
          backgroundColor: color,
          borderWidth: 3,
          tension: 0.32,
          pointRadius: (context) =&gt; context.dataIndex === context.dataset.data.length - 1 ? 5 : 0,

          pointBorderWidth: 3,
          pointBorderColor: &quot;rgba(255,255,255,.18)&quot;,

      chartWrap.style.display = &quot;block&quot;;

      const showYear = (activeRange === &quot;1y&quot; || activeRange === &quot;all&quot;) &amp;&amp; crossesYears;
      const tickFmt = activeRange === &quot;live&quot; ? &quot;HH:mm&quot; : activeRange === &quot;1d&quot; ? &quot;HH:mm&quot; : activeRange === &quot;1w&quot; ? &quot;d MMM&quot; : activeRange === &quot;1m&quot; ? &quot;d MMM&quot; : showYear ? &quot;dd MMM yy&quot; : activeRange === &quot;1y&quot; ? &quot;dd MMM&quot; : &quot;MMM&quot;;
      const tooltipFmt = activeRange === &quot;live&quot; || activeRange === &quot;1d&quot; ? &quot;d MMM, HH:mm&quot; : showYear ? &quot;dd MMM yy&quot; : &quot;d MMM&quot;;

      chart = new Chart(ctx, {

        data: { datasets },

          responsive: true,

                  const x = items?.[0]?.parsed?.x;
                  if (!x) return &quot;&quot;;
                  return typeof dateFns !== &quot;undefined&quot; ? dateFns.format(new Date(x), tooltipFmt) : new Date(x).toLocaleString();
                },
                label: (ctx) =&gt; `${ctx.dataset?.label || &quot;&quot;}: ${typeof ctx.parsed?.y === &quot;number&quot; ? ctx.parsed.y.toFixed(1) + &quot;%&quot; : &quot;—&quot;}`
              }
            }
          },
          interaction: { mode: &quot;index&quot;, intersect: false },
          scales: {
            x: {
              type: &quot;time&quot;,
              time: {
                unit: xUnit,
                displayFormats: { minute: &quot;HH:mm&quot;, hour: &quot;HH:mm&quot;, day: &quot;d MMM&quot;, month: showYear ? &quot;dd MMM yy&quot; : (activeRange === &quot;1y&quot; ? &quot;dd MMM&quot; : &quot;MMM&quot;) },
                tooltipFormat: tooltipFmt
              },
              grid: { color: document.body.classList.contains(&quot;lightTheme&quot;) ? &quot;rgba(0,0,0,.08)&quot; : &quot;rgba(255,255,255,.10)&quot;, borderDash: [4, 4] },
              ticks: {

                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: activeRange === &quot;live&quot; ? 7 : activeRange === &quot;1d&quot; ? 8 : activeRange === &quot;1w&quot; ? 7 : 6,
                callback: (_value, index, ticks) =&gt; {
                  const raw = (ticks?.[index] &amp;&amp; typeof ticks[index].value === &quot;number&quot;) ? ticks[index].value : (typeof _value === &quot;number&quot; ? _value : Number(_value));
                  if (!Number.isFinite(raw)) return &quot;&quot;;

    async function fetchContracts24hForTicker(ticker) {
      const t = (ticker || &quot;&quot;).toUpperCase();
      if (!t) return { yesContracts: NaN, noContracts: NaN };
      const cached = notional24hCache.get(t);
      if (cached &amp;&amp; Date.now() - cached.tsMs &lt; 60000) return { yesContracts: cached.yesContracts, noContracts: cached.noContracts };

      const endTs = Math.floor(Date.now() / 1000);
      const startTs = endTs - 86400;
      let cursor = null;
      let yesContracts = 0;
      let noContracts = 0;

      for (let page = 0; page &lt; 15; page++) {
        const qs = new URLSearchParams({ ticker: t, min_ts: String(startTs), max_ts: String(endTs), limit: &quot;1000&quot; });
        if (cursor) qs.set(&quot;cursor&quot;, cursor);
        const payload = await fetchJSON(`${BASE}/markets/trades?${qs.toString()}`);
        const trades = Array.isArray(payload?.trades) ? payload.trades : [];
        for (const tr of trades) {
          const count = n(tr?.count) ?? n(tr?.count_fp) ?? 0;
          if (count &lt;= 0) continue;
          const side = String(tr?.taker_side || tr?.side || &quot;&quot;).toLowerCase();
          if (side === &quot;yes&quot;) yesContracts += count;
          else if (side === &quot;no&quot;) noContracts += count;
        }
        cursor = payload?.cursor || null;
        if (!cursor || !trades.length) break;
      }

      notional24hCache.set(t, { tsMs: Date.now(), yesContracts, noContracts });
      return { yesContracts, noContracts };
    }

    async function fetchContracts24hForEvent(eventTicker) {
      const ev = (eventTicker || &quot;&quot;).toUpperCase();
      if (!ev) return { yesContracts: NaN, noContracts: NaN };
      const cached = eventNotional24hCache.get(ev);
      if (cached &amp;&amp; Date.now() - cached.tsMs &lt; 60000) return { yesContracts: cached.yesContracts, noContracts: cached.noContracts };
      const tickers = lastEventMarkets.map((m) =&gt; (m?.ticker || m?.market_ticker || &quot;&quot;).toUpperCase()).filter(Boolean);
      const settled = await Promise.allSettled(tickers.map((t) =&gt; fetchContracts24hForTicker(t)));
      let yesContracts = 0;
      let noContracts = 0;
      for (const item of settled) {
        if (item.status !== &quot;fulfilled&quot;) continue;
        const r = item.value;
        if (Number.isFinite(r.yesContracts)) yesContracts += r.yesContracts;
        if (Number.isFinite(r.noContracts)) noContracts += r.noContracts;
      }
      eventNotional24hCache.set(ev, { tsMs: Date.now(), yesContracts, noContracts });
      return { yesContracts, noContracts };
    }

    function buildLockedExportHtml() {

      const clonedDoc = document.documentElement.cloneNode(true);

      hiddenStyle.textContent = &quot;#searchWrap{display:none !important;} html,body{padding:0 !important;margin:0 !important;background:transparent !important;}&quot;;

      const configScript = document.createElement(&quot;script&quot;);
      configScript.textContent = `window.__KALSHI_EMBED__ = ${JSON.stringify(state)};`;
      clonedDoc.querySelector(&quot;head&quot;).appendChild(configScript);

      return &quot;&lt;!doctype html&gt;\n&quot; + clonedDoc.outerHTML;
    }

    function downloadCurrentHtml() {
      const html = buildLockedExportHtml();
      const blob = new Blob([html], { type: &quot;text/html;charset=utf-8&quot; });
      const url = URL.createObjectURL(blob);
      const slug = (activeEventTicker || activeMarketTicker || &quot;kalshi_widget&quot;).toLowerCase();
      const brandSlug = (currentBrandKey || &quot;vegasinsider&quot;).toLowerCase();
      const a = document.createElement(&quot;a&quot;);
      a.href = url;
      a.download = `kalshi_${brandSlug}_${slug}_locked.html`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() =&gt; {
        URL.revokeObjectURL(url);
        a.remove();
      }, 0);
    }

    async function copyCurrentHtml() {
      const html = buildLockedExportHtml();
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(html);
      } else {
        const ta = document.createElement(&quot;textarea&quot;);
        ta.value = html;
        ta.style.position = &quot;fixed&quot;;
        ta.style.left = &quot;-9999px&quot;;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand(&quot;copy&quot;);
        ta.remove();
      }
    }

    // UI wiring
    inputBox.addEventListener(&quot;input&quot;, () =&gt; {
      const start = inputBox.selectionStart;
      const end = inputBox.selectionEnd;
      const upper = inputBox.value.toUpperCase();
      if (inputBox.value !== upper) {
        inputBox.value = upper;
        try { inputBox.setSelectionRange(start, end); } catch (_) {}
      }
    });

    el(&quot;loadBtn&quot;).addEventListener(&quot;click&quot;, () =&gt; loadFromInput(inputBox.value));
    inputBox.addEventListener(&quot;keydown&quot;, (e) =&gt; {
      if (e.key === &quot;Enter&quot;) {
        e.preventDefault();
        loadFromInput(inputBox.value);
      }
    });

    sortSelect.addEventListener(&quot;change&quot;, () =&gt; {
      if (lastEventMarkets.length) renderMarketsList(lastEventMarkets);
    });

    toggleMarketsBtn.addEventListener(&quot;click&quot;, () =&gt; {
      if (!lastEventMarkets.length) return;
      marketsExpanded = !marketsExpanded;
      renderMarketsList(lastEventMarkets);
    });

    document.querySelectorAll(&quot;[data-range]&quot;).forEach((btn) =&gt; {
      btn.addEventListener(&quot;click&quot;, async () =&gt; {
        activeRange = btn.getAttribute(&quot;data-range&quot;);
        updateRangeButtonsActive();
        try {
          if (activeMode === &quot;event&quot;) await loadEventChart();
          if (activeMode === &quot;market&quot; &amp;&amp; activeMarketTicker) await loadChartForMarketTickers([activeMarketTicker]);
        } catch (e) {
          errEl.textContent = `Chart error:\n${e.message}`;
        }
      });
    });

    document.querySelectorAll(&quot;[data-chartmode]&quot;).forEach((btn) =&gt; {
      btn.addEventListener(&quot;click&quot;, async () =&gt; {
        if (activeMode !== &quot;event&quot;) return;
        const mode = btn.getAttribute(&quot;data-chartmode&quot;);
        if (mode === &quot;selected&quot;) {
          eventChartMode = selectedEventMarketTicker ? &quot;selected&quot; : &quot;default&quot;;
        } else {
          eventChartMode = &quot;default&quot;;
        }
        updateChartModeButtons();
        updateSelectedModeAvailability();
        await updateEventTopTiles();
        await updateEventNotionalPill();
        try {
          await loadEventChart();
        } catch (e) {
          errEl.textContent = `Chart error:\n${e.message}`;
        }
      });
    });

    const brandBtn = el(&quot;brandBtn&quot;);
    const brandMenu = el(&quot;brandMenu&quot;);
    brandBtn.addEventListener(&quot;click&quot;, (e) =&gt; { e.preventDefault(); e.stopPropagation(); toggleMenu(brandMenu, brandBtn); });
    brandMenu.addEventListener(&quot;click&quot;, (e) =&gt; {
      const opt = e.target.closest(&quot;.brandOpt&quot;);
      if (!opt) return;
      applyBrand(opt.getAttribute(&quot;data-brand&quot;));
      closeMenu(brandMenu, brandBtn);
    });

    const themeBtn = el(&quot;themeBtn&quot;);
    themeBtn.addEventListener(&quot;click&quot;, () =&gt; {
      setTheme(document.body.classList.contains(&quot;lightTheme&quot;) ? &quot;dark&quot; : &quot;light&quot;);
    });

    const htmlBtn = el(&quot;downloadHtmlBtn&quot;);
    const htmlMenu = el(&quot;htmlMenu&quot;);
    htmlBtn.addEventListener(&quot;click&quot;, (e) =&gt; { e.preventDefault(); e.stopPropagation(); toggleMenu(htmlMenu, htmlBtn); });
    el(&quot;htmlDownloadOpt&quot;).addEventListener(&quot;click&quot;, (e) =&gt; {
      e.preventDefault(); e.stopPropagation(); closeMenu(htmlMenu, htmlBtn); downloadCurrentHtml();
    });
    el(&quot;htmlCopyOpt&quot;).addEventListener(&quot;click&quot;, async (e) =&gt; {
      e.preventDefault(); e.stopPropagation(); closeMenu(htmlMenu, htmlBtn);
      try {
        await copyCurrentHtml();
        htmlBtn.textContent = &quot;Copied ✓&quot;;
        setTimeout(() =&gt; { htmlBtn.textContent = &quot;HTML ▾&quot;; }, 900);
      } catch (err) {
        alert(err.message || String(err));
      }
    });

    document.addEventListener(&quot;click&quot;, () =&gt; {
      closeMenu(brandMenu, brandBtn);
      closeMenu(htmlMenu, htmlBtn);
    });
    document.addEventListener(&quot;keydown&quot;, (e) =&gt; {
      if (e.key === &quot;Escape&quot;) {
        closeMenu(brandMenu, brandBtn);
        closeMenu(htmlMenu, htmlBtn);
      }
    });

    // Restore settings
    const bootBrand = EMBED_CONFIG?.brand || params.get(&quot;brand&quot;) || (() =&gt; {
      try { return localStorage.getItem(&quot;kalshi_widget_brand&quot;) || &quot;vegasinsider&quot;; } catch (_) { return &quot;vegasinsider&quot;; }
    })();
    const bootTheme = EMBED_CONFIG?.theme || params.get(&quot;theme&quot;) || (() =&gt; {
      try { return localStorage.getItem(&quot;kalshi_widget_theme&quot;) || &quot;dark&quot;; } catch (_) { return &quot;dark&quot;; }
    })();
    applyBrand(bootBrand, !IS_LOCKED_EXPORT);
    setTheme(bootTheme, !IS_LOCKED_EXPORT);
    applyLockedExportChrome();

    activeRange = EMBED_CONFIG?.range || activeRange;
    if (EMBED_CONFIG?.eventChartMode === &quot;selected&quot; || EMBED_CONFIG?.eventChartMode === &quot;default&quot;) {
      eventChartMode = EMBED_CONFIG.eventChartMode;
    }
    if (EMBED_CONFIG?.selectedEventMarketTicker) {
      selectedEventMarketTicker = String(EMBED_CONFIG.selectedEventMarketTicker).toUpperCase();
    }

    updateRangeButtonsActive();
    updateChartModeButtons();
    updateSelectedModeAvailability();

    // Boot from locked export config or URL if available
    const bootEvent = (EMBED_CONFIG?.eventTicker || params.get(&quot;event&quot;) || &quot;&quot;).trim();
    const bootTicker = (EMBED_CONFIG?.marketTicker || params.get(&quot;ticker&quot;) || &quot;&quot;).trim();
    if (bootEvent) {
      if (inputBox) inputBox.value = bootEvent.toUpperCase();
      loadEvent(bootEvent.toUpperCase());
    } else if (bootTicker) {
      if (inputBox) inputBox.value = bootTicker.toUpperCase();
      loadMarket(bootTicker.toUpperCase());
    }

    // Auto refresh
    setInterval(async () =&gt; {
      if (document.hidden) return;
      try {
        if (activeMode === &quot;market&quot;) {
          await refreshActiveMarketSnapshot();
          if (activeMarketTicker) await loadChartForMarketTickers([activeMarketTicker]);
        } else if (activeMode === &quot;event&quot;) {
          await refreshActiveEventList();
          await loadEventChart();
        }
      } catch (_) {}
    }, AUTO_REFRESH_MS);
  &lt;/script&gt;


&lt;/body&gt;&lt;/html&gt;"></iframe>
</div>

<script>
(function(){
  const frame = document.getElementById('viKalshiMarketFrame');
  if (!frame) return;

  function resizeKalshiFrame(){
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      if (!doc) return;
      const card = doc.getElementById('widgetCard');
      const h = Math.ceil((card ? card.getBoundingClientRect().height : doc.documentElement.scrollHeight) + 2);
      if (h > 300) frame.style.height = h + 'px';
    } catch (_) {}
  }

  frame.addEventListener('load', function(){
    resizeKalshiFrame();
    let ticks = 0;
    const timer = setInterval(function(){
      resizeKalshiFrame();
      ticks += 1;
      if (ticks > 24) clearInterval(timer);
    }, 350);
  });

  window.addEventListener('resize', resizeKalshiFrame);
})();
</script>
